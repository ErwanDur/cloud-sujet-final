name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      lambda: ${{ steps.filter.outputs.lambda }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
            lambda:
              - 'lambda/handler.py'

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  terraform:
    runs-on: ubuntu-latest
    needs: [changes, gitleaks, commitlint]
    if: needs.changes.outputs.terraform == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: arn:aws:iam::738563260931:role/role_etudiants
          role-session-name: github-actions-terraform
          role-skip-session-tagging: true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Package Lambda artifacts
        working-directory: ${{ github.workspace }}
        run: |
          zip -j terraform/handler.zip lambda/handler.py
          cp lambda/layers/pillow.zip terraform/pillow.zip

      - name: fmt
        run: terraform fmt -check -recursive

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          quiet: true
          soft_fail: true

      - name: init
        run: terraform init

      - name: validate
        run: terraform validate

      - name: plan
        run: terraform plan -out=tfplan

      - name: setup infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: infracost breakdown
        run: infracost breakdown --path .

      - name: apply
        if: github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan

  ansible:
    runs-on: ubuntu-latest
    needs: [changes, gitleaks, commitlint, terraform]
    if: needs.changes.outputs.lambda == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: arn:aws:iam::738563260931:role/role_etudiants
          role-session-name: github-actions-ansible
          role-skip-session-tagging: true

      - name: install ansible + collection
        run: |
          pip install ansible ansible-lint
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: ansible-lint
        run: ansible-lint ansible/playbook.yml

      - name: deploy
        if: github.event_name == 'workflow_dispatch'
        run: ansible-playbook ansible/playbook.yml -i ansible/inventory.ini

  release:
    runs-on: ubuntu-latest
    needs: [gitleaks, commitlint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: cycjimmy/semantic-release-action@v4
        id: release
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lambda-publish:
    runs-on: ubuntu-latest
    needs: [release, ansible]
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
          role-to-assume: arn:aws:iam::738563260931:role/role_etudiants
          role-session-name: github-actions-release
          role-skip-session-tagging: true

      - name: publish lambda version
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name ynov-image-converter \
            --description "v${{ needs.release.outputs.new_release_version }}" \
            --query 'Version' --output text)

          aws lambda update-alias \
            --function-name ynov-image-converter \
            --name production \
            --function-version "$VERSION"
