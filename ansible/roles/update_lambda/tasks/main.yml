---
- name: Package handler.py into a zip
  ansible.builtin.command:
    cmd: "zip /tmp/handler.zip handler.py"
    chdir: "{{ update_lambda_handler_dir }}"
  changed_when: true

- name: Update Lambda function code
  amazon.aws.lambda:
    name: "{{ update_lambda_function_name }}"
    state: present
    zip_file: /tmp/handler.zip
    runtime: python3.11
    handler: handler.lambda_handler
    region: "{{ update_lambda_region }}"

- name: Remove temporary zip
  ansible.builtin.file:
    path: /tmp/handler.zip
    state: absent
